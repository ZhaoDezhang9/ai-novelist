name: Feature Request
description: Suggest an idea or enhancement for AI Novelist
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please provide as much detail as possible to help us understand your request.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Why is this needed?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: "I think we should add..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions or features have you considered?
      placeholder: "I also thought about..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request.
      placeholder: |
        - Use case: [e.g., professional writers, hobbyists]
        - Impact: [e.g., improves workflow, saves time]
        - Related features: [e.g., ties into existing memory system]

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which part of AI Novelist would this affect?
      multiple: false
      options:
        - UI/UX (Frontend)
        - Backend/API
        - Novel Generation Engine
        - Quality Checking System
        - Memory System
        - Visualization/Charts
        - Export/Import
        - Configuration/Settings
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (from your perspective)
      description: How important is this feature to you?
      multiple: false
      options:
        - Critical - Blocks my usage
        - High - Would significantly improve my experience
        - Medium - Nice to have
        - Low - Minor improvement

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution Interest
      description: Would you be interested in contributing to this feature?
      options:
        - label: I'd be willing to help implement this feature
        - label: I can provide detailed requirements and testing
        - label: I can help with documentation
        - label: Not able to contribute at this time